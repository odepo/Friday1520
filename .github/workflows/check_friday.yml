name: Friday Supply Demand Scan
on:
  schedule:
    - cron: '15 6 * * 5' # UTCなので日本時間 金曜15:15
  workflow_dispatch:      # 「今すぐ動かす」ボタンを出す設定

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python_version: '3.x'
      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy
      - name: Run scan
        run: python scan_and_rank.py
      - name: Commit and push if changed
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add result.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update result.json"
          git push
